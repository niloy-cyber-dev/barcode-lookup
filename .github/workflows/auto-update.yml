name: Weekly Open Food Facts Sync

on:
  schedule:
    - cron: '0 0 * * 0' # Automated trigger: Every Sunday at 00:00 UTC
  workflow_dispatch: # Manual trigger: Allows clicking a button on GitHub to run anytime

permissions:
  contents: write # Allows GitHub actions to push files back into your repository

jobs:
  sync-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Setup Modern Node.js Runtime
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Project Node Dependencies
      run: npm install

    # Clean Linux native installation via the system package manager (No wget, No unzips)
    - name: Install DuckDB via Ubuntu Package Manager
      run: |
        sudo apt-get update -y
        sudo apt-get install -y duckdb

    - name: Fetch Fresh Indian Food Data Stream via DuckDB
      run: |
        duckdb -c "
        COPY (
            SELECT 
                code AS barcode, 
                product_name, 
                categories_en AS category,
                ingredients_text AS ingredients,
                image_url,
                nutriscore_grade AS score,
                energy_100g AS calories,
                fat_100g AS fat,
                carbohydrates_100g AS carbs,
                proteins_100g AS protein,
                sodium_100g AS sodium
            FROM read_parquet('https://huggingface.co') 
            WHERE countries_en ILIKE '%India%'
        ) TO 'indian_food_nutrition.csv' (HEADER, DELIMITER ',');
        "

    - name: Build Database JSON Collections
      run: node build-split-db.js

    - name: Clean Large Temp Files
      run: rm -f indian_food_nutrition.csv

    - name: Deploy Changes back to GitHub Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add public/
        
        # Deploy files only if new or modified data changes are discovered
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Automated Weekly Sync: Fresh Indian Grocery Data" && git push)
